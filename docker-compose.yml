services:
  db:
    image: mariadb:11.4
    container_name: openspec-db
    # command: ['mysqld', '--sql-mode=STRICT_ALL_TABLES']
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: 1234
      MARIADB_DATABASE: openspec
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./openspec-mariadb-adapter/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

volumes:
  mariadb_data:
